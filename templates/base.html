<!DOCTYPE html>
<html lang="en" data-theme="{{ theme or 'dark' }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Project Control Dashboard{% endblock %}</title>
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    
    {% block extra_css %}{% endblock %}
</head>
<body class="theme-{{ theme or 'dark' }}">
    <div class="wrapper">
        <!-- Sidebar -->
        <nav id="sidebar" class="sidebar">
            <div class="sidebar-header">
                <h3 class="mb-0">
                    <i class="bi bi-kanban-fill me-2"></i>
                    <span class="sidebar-text">Project Manager</span>
                </h3>
            </div>
            
            <ul class="list-unstyled components">
                <li class="{% if request.path == '/' %}active{% endif %}">
                    <a href="/">
                        <i class="bi bi-grid-1x2-fill"></i>
                        <span class="sidebar-text">Projects</span>
                    </a>
                </li>
                <li class="{% if request.path == '/dashboard' %}active{% endif %}">
                    <a href="/dashboard">
                        <i class="bi bi-speedometer2"></i>
                        <span class="sidebar-text">System Dashboard</span>
                    </a>
                </li>
                <li class="{% if request.path == '/settings' %}active{% endif %}">
                    <a href="/settings">
                        <i class="bi bi-gear-fill"></i>
                        <span class="sidebar-text">Settings</span>
                    </a>
                </li>
            </ul>
            
            <div class="sidebar-footer">
                <div class="d-flex align-items-center px-3">
                    <div class="status-indicator me-2" id="manager-status"></div>
                    <small class="sidebar-text">Manager Running</small>
                </div>
            </div>
        </nav>
        
        <!-- Page Content -->
        <div id="content" class="content">
            <!-- Top Navbar -->
            <nav class="navbar navbar-expand-lg top-navbar border-bottom">
                <div class="container-fluid">
                    <button type="button" id="sidebarCollapse" class="btn btn-icon">
                        <i class="bi bi-list"></i>
                    </button>
                    
                    <span class="navbar-brand mb-0 h1 d-none d-md-block">
                        {% block page_title %}Dashboard{% endblock %}
                    </span>
                    
                    <div class="d-flex align-items-center gap-3">
                        <div class="me-3 text-end d-none d-lg-block">
                            <small class="text-muted">Uptime</small>
                            <div id="uptime-display" class="fw-bold">--</div>
                        </div>
                        <div class="system-indicators d-flex gap-2">
                            <div class="indicator" id="cpu-indicator" title="CPU">
                                <i class="bi bi-cpu"></i>
                                <span class="value">--%</span>
                            </div>
                            <div class="indicator" id="memory-indicator" title="Memory">
                                <i class="bi bi-memory"></i>
                                <span class="value">--%</span>
                            </div>
                        </div>
                    </div>
                </div>
            </nav>
            
            <!-- Main Content -->
            <main class="container-fluid py-4">
                {% block content %}{% endblock %}
            </main>
        </div>
    </div>
    
    <!-- Toast Container -->
    <div id="toast-container" class="toast-container position-fixed bottom-0 end-0 p-3"></div>
    
    <!-- Bootstrap 5 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Custom JS -->
    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
    
    {% block extra_js %}{% endblock %}
</body>
</html>
